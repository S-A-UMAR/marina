{% load static %}
<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline | Marina Gadgets</title>
    <meta name="theme-color" content="#185ABD">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: var(--space-xl);
            background: var(--color-surface);
        }
        .offline-card {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: var(--space-xxl);
            box-shadow: var(--shadow-3);
            max-width: 480px;
            width: 100%;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: var(--space-lg);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1 style="font-size: 28px; font-weight: 800; color: var(--color-text-primary); margin-bottom: var(--space-sm);">
            You're Offline
        </h1>
        <p style="color: var(--color-text-secondary); font-size: var(--font-size-base); line-height: 1.6; margin-bottom: var(--space-xl);">
            It looks like you've lost your internet connection. Please check your connection and try again.
            Some pages you've already visited may still be available.
        </p>
        <div style="display: flex; flex-direction: column; gap: var(--space-md);">
            <button onclick="window.location.reload()" class="btn btn-primary btn-lg">
                <i class="fa-solid fa-rotate"></i> Try Again
            </button>
            <a href="/" class="btn btn-ghost btn-lg">
                <i class="fa-solid fa-house"></i> Go to Homepage
            </a>
        </div>
        <p style="font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: var(--space-xl);">
            Marina Gadgets Kano — Premium Tech, Delivered Fast
        </p>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
